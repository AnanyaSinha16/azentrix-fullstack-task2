services:
  - type: web
    name: azentrix-fullstack-task2
    runtime: node
    plan: free
    buildCommand: npm install && npm run build && npx prisma db push && npm run db:seed
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: NEXT_PUBLIC_APP_URL
        sync: false
